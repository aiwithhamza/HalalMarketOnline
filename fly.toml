app = "halal-market-online"
primary_region = "ams"

[build]
  [build.args]
    NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[mounts]]
  source = "halal_market_data"
  destination = "/app/data"

[env]
  DATABASE_PATH = "/app/data/database.sqlite"
  PORT = "3000"
