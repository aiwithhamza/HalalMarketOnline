services:
  - type: web
    name: halal-market-online
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_SECRET_KEY
        value: HALAL_ADMIN_2026
      - key: DATABASE_PATH
        value: /app/data/database.sqlite
    disk:
      name: halal-market-data
      mountPath: /app/data
      sizeGB: 1
